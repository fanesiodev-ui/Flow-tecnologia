<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ContaFácil — Acesso</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'Inter', sans-serif; }
    .gradient-bg { background: linear-gradient(135deg, #0F1F3D 0%, #1D4ED8 100%); }
    .fade-in { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    .spinner { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-md fade-in">

    <!-- Logo -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center gap-3 mb-2">
        <div class="w-10 h-10 bg-white/20 rounded-xl flex items-center justify-center text-white font-black text-base">CF</div>
        <span class="text-white font-bold text-2xl">ContaFácil</span>
      </div>
      <p class="text-blue-200 text-sm">Sistema de Relatórios Contábeis</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-2xl overflow-hidden">

      <!-- Tabs -->
      <div class="flex border-b border-slate-100">
        <button id="tab-login" onclick="mostrarTab('login')"
          class="flex-1 py-4 text-sm font-600 font-semibold text-blue-600 border-b-2 border-blue-600 transition">
          Entrar
        </button>
        <button id="tab-register" onclick="mostrarTab('register')"
          class="flex-1 py-4 text-sm font-semibold text-slate-400 border-b-2 border-transparent transition hover:text-slate-600">
          Criar Conta
        </button>
      </div>

      <!-- Login Form -->
      <div id="form-login" class="p-8">
        <h2 class="text-lg font-bold text-slate-800 mb-1">Bem-vindo de volta</h2>
        <p class="text-slate-400 text-sm mb-6">Entre com suas credenciais para continuar.</p>

        <div class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">E-mail</label>
            <input id="login-email" type="email" placeholder="seu@email.com"
              class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Senha</label>
            <input id="login-senha" type="password" placeholder="••••••••"
              onkeydown="if(event.key==='Enter') fazerLogin()"
              class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
          </div>
        </div>

        <div id="login-erro" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm"></div>

        <button onclick="fazerLogin()" id="btn-login"
          class="mt-6 w-full bg-blue-600 text-white font-semibold py-3 rounded-xl hover:bg-blue-700 transition flex items-center justify-center gap-2">
          <span id="btn-login-text">Entrar</span>
        </button>
      </div>

      <!-- Register Form -->
      <div id="form-register" class="p-8 hidden">
        <h2 class="text-lg font-bold text-slate-800 mb-1">Crie sua conta</h2>
        <p class="text-slate-400 text-sm mb-6">Cadastre seu escritório e comece a usar.</p>

        <div class="space-y-4">
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Nome do Contador</label>
            <input id="reg-nome" type="text" placeholder="Seu nome completo"
              class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Nome do Escritório</label>
            <input id="reg-escritorio" type="text" placeholder="Contabilidade Silva & Assoc."
              class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">E-mail</label>
            <input id="reg-email" type="email" placeholder="seu@email.com"
              class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
          </div>
          <div>
            <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wide mb-1.5">Senha</label>
            <input id="reg-senha" type="password" placeholder="Mínimo 6 caracteres"
              class="w-full border border-slate-200 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent" />
          </div>
        </div>

        <div id="reg-erro" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm"></div>

        <button onclick="registrar()" id="btn-register"
          class="mt-6 w-full bg-blue-600 text-white font-semibold py-3 rounded-xl hover:bg-blue-700 transition flex items-center justify-center gap-2">
          <span id="btn-register-text">Criar Conta</span>
        </button>
      </div>
    </div>

    <p class="text-center text-blue-200/60 text-xs mt-6">
      Flow Tecnologia · ContaFácil SaaS
    </p>
  </div>

  <script>
    const API = "http://localhost:8080";

    // Redireciona se já estiver logado
    if (localStorage.getItem("cf_token")) {
      window.location.href = "/app/index.html";
    }

    function mostrarTab(tab) {
      const isLogin = tab === "login";
      document.getElementById("form-login").classList.toggle("hidden", !isLogin);
      document.getElementById("form-register").classList.toggle("hidden", isLogin);
      document.getElementById("tab-login").className =
        `flex-1 py-4 text-sm font-semibold transition border-b-2 ${isLogin ? "text-blue-600 border-blue-600" : "text-slate-400 border-transparent hover:text-slate-600"}`;
      document.getElementById("tab-register").className =
        `flex-1 py-4 text-sm font-semibold transition border-b-2 ${!isLogin ? "text-blue-600 border-blue-600" : "text-slate-400 border-transparent hover:text-slate-600"}`;
    }

    async function fazerLogin() {
      const email = document.getElementById("login-email").value.trim();
      const senha = document.getElementById("login-senha").value;
      const erroEl = document.getElementById("login-erro");
      const btn = document.getElementById("btn-login");
      const btnText = document.getElementById("btn-login-text");

      if (!email || !senha) { mostrarErro(erroEl, "Preencha e-mail e senha."); return; }

      btn.disabled = true;
      btnText.innerHTML = `<div class="spinner w-4 h-4 border-2 border-white/40 border-t-white rounded-full"></div> Entrando...`;

      try {
        const form = new FormData();
        form.append("username", email);
        form.append("password", senha);

        const res = await fetch(`${API}/auth/login`, { method: "POST", body: form });
        const data = await res.json();

        if (!res.ok) { mostrarErro(erroEl, data.detail || "Erro ao entrar."); return; }

        localStorage.setItem("cf_token", data.access_token);
        localStorage.setItem("cf_user", JSON.stringify(data.contador));
        window.location.href = "/app/index.html";

      } catch (e) {
        mostrarErro(erroEl, "Não foi possível conectar ao servidor.");
      } finally {
        btn.disabled = false;
        btnText.textContent = "Entrar";
      }
    }

    async function registrar() {
      const nome = document.getElementById("reg-nome").value.trim();
      const escritorio = document.getElementById("reg-escritorio").value.trim();
      const email = document.getElementById("reg-email").value.trim();
      const senha = document.getElementById("reg-senha").value;
      const erroEl = document.getElementById("reg-erro");
      const btn = document.getElementById("btn-register");
      const btnText = document.getElementById("btn-register-text");

      if (!nome || !escritorio || !email || !senha) { mostrarErro(erroEl, "Preencha todos os campos."); return; }
      if (senha.length < 6) { mostrarErro(erroEl, "A senha deve ter pelo menos 6 caracteres."); return; }

      btn.disabled = true;
      btnText.innerHTML = `<div class="spinner w-4 h-4 border-2 border-white/40 border-t-white rounded-full"></div> Criando conta...`;

      try {
        const res = await fetch(`${API}/auth/register`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ nome, escritorio, email, senha }),
        });
        const data = await res.json();

        if (!res.ok) { mostrarErro(erroEl, data.detail || "Erro ao criar conta."); return; }

        localStorage.setItem("cf_token", data.token);
        localStorage.setItem("cf_user", JSON.stringify(data.contador));
        window.location.href = "/app/index.html";

      } catch (e) {
        mostrarErro(erroEl, "Não foi possível conectar ao servidor.");
      } finally {
        btn.disabled = false;
        btnText.textContent = "Criar Conta";
      }
    }

    function mostrarErro(el, msg) {
      el.textContent = msg;
      el.classList.remove("hidden");
    }
  </script>
</body>
</html>
